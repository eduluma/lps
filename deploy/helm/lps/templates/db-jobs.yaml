# db-migrate: runs `alembic upgrade head` after every install/upgrade.
# db-seed: runs once after a successful migrate to seed distros + releases.
# Both are idempotent — safe to run repeatedly.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-db-migrate
  namespace: {{ .Values.global.namespace }}
  labels:
    app: lps-db-migrate
    {{- include "lps.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: lps-db-migrate
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      initContainers:
        # Wait for PostgreSQL to be ready before running migrations.
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h {{ .Release.Name }}-postgresql -U {{ .Values.postgresql.auth.username }}; do
                echo "waiting for postgres..."; sleep 3
              done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-db-credentials" .Release.Name) .Values.postgresql.auth.existingSecret }}
                  key: POSTGRES_PASSWORD
      containers:
        - name: migrate
          image: {{ include "lps.image" (dict "local" .Values.api.image "global" .Values.global.image "name" "api") }}
          imagePullPolicy: {{ include "lps.pullPolicy" (dict "local" .Values.api.image "global" .Values.global.image) }}
          workingDir: /app/api
          command: ["uv", "run", "alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-db-credentials" .Release.Name) .Values.postgresql.auth.existingSecret }}
                  key: DATABASE_URL
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-db-seed
  namespace: {{ .Values.global.namespace }}
  labels:
    app: lps-db-seed
    {{- include "lps.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: lps-db-seed
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      containers:
        - name: seed
          image: {{ include "lps.image" (dict "local" .Values.api.image "global" .Values.global.image "name" "api") }}
          imagePullPolicy: {{ include "lps.pullPolicy" (dict "local" .Values.api.image "global" .Values.global.image) }}
          workingDir: /app/api
          command: ["uv", "run", "python", "-m", "app.seed"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-db-credentials" .Release.Name) .Values.postgresql.auth.existingSecret }}
                  key: DATABASE_URL
