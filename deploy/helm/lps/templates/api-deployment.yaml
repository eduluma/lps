# ── Deployment ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app: lps-api
    {{- include "lps.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: lps-api
  template:
    metadata:
      labels:
        app: lps-api
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "lps.image" (dict "local" .Values.api.image "global" .Values.global.image "name" "api") }}
          imagePullPolicy: {{ include "lps.pullPolicy" (dict "local" .Values.api.image "global" .Values.global.image) }}
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-db-credentials" .Release.Name) .Values.postgresql.auth.existingSecret }}
                  key: DATABASE_URL
            {{- range $key, $val := .Values.api.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
# ── Service ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app: lps-api
    {{- include "lps.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: lps-api
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
